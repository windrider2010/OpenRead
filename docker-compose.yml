services:
  app:
    container_name: openread
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma-4-31b-it}
      STORY_COMPILER_MODE: ${STORY_COMPILER_MODE:-gemma_vision}
      STORY_COMPILER_TIMEOUT_SECONDS: ${STORY_COMPILER_TIMEOUT_SECONDS:-90}
      KOKORO_DEVICE: ${KOKORO_DEVICE:-cpu}
      PADDLE_USE_GPU: ${PADDLE_USE_GPU:-0}
      PADDLE_ENABLE_MKLDNN: ${PADDLE_ENABLE_MKLDNN:-0}
      PADDLE_ENABLE_HPI: ${PADDLE_ENABLE_HPI:-0}
      PADDLE_CPU_THREADS: ${PADDLE_CPU_THREADS:-4}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: ${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-True}
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    init: true
    volumes:
      - media_data:/app/backend/var/media
      - model_cache:/root/.cache
      - paddlex_models:/root/.paddlex
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  media_data:
  model_cache:
  paddlex_models:
